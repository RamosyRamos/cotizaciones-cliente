<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller Ramos y Ramos – Tu Cotización</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fondo:    #E6E4DB;
      --negro:    #1A1A1D;
      --card:     #FCFBF8;
      --card2:    #F2F0E9;
      --borde:    #D6D3C8;
      --borde-activo: #444;
      --texto:    #1A1A1D;
      --muted:    #8A8C86;
      --success:  #1F7A4D;
      --rojo:     #B83A2E;
      --rojo-dark:#8F2A20;
      --rojo-glow:rgba(184,58,46,0.10);
      --navy:     #15225F;
      --dim:      #5C5C62;
      --line2:    #E4E1D8;
      --warn:        #8A5A0A;
      --warn-bg:     #FBF3E0;
      --warn-border: #D9B870;
      --crit-bg:      #F7E0DC;
      --crit-border:  #D99B92;
      --ok-tag-bg:    #E0F0E6;
      --ok-tag-border:#9BCBAE;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Titillium Web', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; }

    .header {
      background: var(--card); border-bottom: 3px solid var(--rojo);
      padding: 16px 24px; display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      width: 44px; height: 44px;
      border-radius: 10px; flex-shrink: 0;
      object-fit: contain;
    }
    .header h1 { font-family: 'Titillium Web', sans-serif; font-size: 24px; letter-spacing: 2px; line-height: 1; color: var(--texto); }
    .header p { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 80px; }

    .card {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 18px;
    }
    .card-title {
      font-family: 'Titillium Web', sans-serif; font-size: 16px; letter-spacing: 1.5px;
      color: var(--rojo); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; width: 3px; height: 16px; background: var(--rojo);
      border-radius: 2px; display: inline-block;
    }

    .tag {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .tag-critico, .tag-crítico, .tag-cr\00EDtico { background: var(--crit-bg); color: var(--rojo); border: 1px solid var(--crit-border); }
    .tag-recomendado { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
    .tag-opcional { background: var(--ok-tag-bg); color: var(--success); border: 1px solid var(--ok-tag-border); }

    .mf{display:inline-block;width:16px;height:11px;border-radius:1.5px;overflow:hidden;border:.5px solid rgba(0,0,0,.12);vertical-align:-1px;position:relative}
    .mf.us{background:repeating-linear-gradient(#b22234 0 1.57px,#fff 1.57px 3.14px)}
    .mf.us::after{content:'';position:absolute;top:0;left:0;width:42%;height:55%;background:#3c3b6e}
    .mf.eu{background:
      radial-gradient(circle 0.8px at 50% 16%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 74% 27%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 83% 50%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 74% 73%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 50% 84%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 26% 73%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 17% 50%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 26% 27%, #FFCC00 97%, transparent 100%),
      #003399}
    .mf.eu::after{content:''}

    .cliente-hero {
      background: var(--card);
      border: 1px solid var(--borde); border-radius: 14px;
      padding: 24px; margin-bottom: 20px; text-align: center;
    }
    .cliente-hero h2 { font-family: 'Titillium Web', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--texto); }
    .cliente-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .cliente-hero .taller-name { color: var(--rojo); font-weight: 700; }

    .instrucciones {
      background: var(--card2); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 20px; font-size: 14px;
    }

    .cliente-repuesto {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 16px;
      transition: border-color 0.25s, background 0.25s;
    }
    .cliente-repuesto.tiene-seleccion { border-color: var(--success); background: color-mix(in srgb, var(--success) 7%, transparent); }
    .cliente-repuesto-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .cliente-repuesto-nombre { font-weight: 700; font-size: 17px; }
    .cliente-repuesto-nota { font-size: 13px; color: var(--muted); margin-top: 5px; font-style: italic; }

    .opciones-cliente { display: flex; flex-direction: column; gap: 8px; }
    .opcion-cliente {
      display: flex; align-items: center; gap: 12px;
      background: var(--card2); border: 1.5px solid var(--borde);
      border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.2s;
    }
    .opcion-cliente:hover { border-color: var(--borde-activo); }
    .opcion-cliente.seleccionada { border-color: var(--success); background: color-mix(in srgb, var(--success) 7%, transparent); }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--borde-activo); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .opcion-cliente.seleccionada .radio-dot { border-color: var(--success); background: var(--success); }
    .radio-dot::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: var(--card); display: none;
    }
    .opcion-cliente.seleccionada .radio-dot::after { display: block; }
    .opcion-cliente-info { flex: 1; }
    .opcion-cliente-titulo { font-weight: 600; font-size: 14px; }
    .opcion-cliente-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .opcion-cliente-precio {
      font-family: 'Titillium Web', sans-serif; font-size: 20px;
      color: var(--success); letter-spacing: 0.5px; white-space: nowrap;
    }
    .no-seleccionar {
      display: flex; align-items: center; gap: 12px;
      background: transparent; border: 1.5px dashed var(--borde);
      border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .no-seleccionar:hover { border-color: var(--borde-activo); }
    .no-seleccionar.seleccionada { border-color: var(--muted); background: var(--card2); }
    .no-seleccionar span { font-size: 13px; color: var(--muted); }

    .resumen-box {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-top: 20px;
    }
    .resumen-box h3 { font-family: 'Titillium Web', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--rojo); margin-bottom: 16px; }
    .resumen-item { padding: 12px 0; border-bottom: 1px solid var(--borde); }
    .resumen-item:last-of-type { border-bottom: none; }
    .resumen-item-nombre { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .resumen-item-det { font-size: 14px; color: var(--muted); }
    .resumen-item-precio { font-family: 'Titillium Web', sans-serif; font-size: 20px; color: var(--success); }
    .resumen-total {
      background: var(--card2); border: 1px solid var(--borde);
      border-radius: 10px; padding: 14px; margin-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .resumen-total span { font-weight: 700; font-size: 15px; }
    .resumen-total .monto-total { font-family: 'Titillium Web', sans-serif; font-size: 30px; color: var(--texto); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border: none; border-radius: 8px;
      font-family: 'Titillium Web', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-wa:hover { filter: brightness(1.12); }
    .btn-wa:disabled { background: var(--muted); color: var(--card); filter: none; cursor: not-allowed; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    #snackbar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 13px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #snackbar.show { opacity: 1; }
    #snackbar.ok { background: var(--success); color: var(--card); }
    #snackbar.err { background: var(--rojo); color: var(--card); }

    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .btn { width: 100%; justify-content: center; }
      .resumen-total { flex-direction: column; gap: 6px; text-align: center; }
    }
    @media (max-width: 600px) {
      .pago-grid-2col { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 480px) {
      .header { padding: 12px 16px; gap: 10px; }
    }
  </style>
</head>

  <div class="empty"><div class="icon">⏳</div><p>Cargando tu cotización...</p></div>
</div>
<div id="snackbar"></div>

<script>
const SUPABASE_URL = 'https://lnsglpvobvfzbxpmyagc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxuc2dscHZvYnZmemJ4cG15YWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ0NTQsImV4cCI6MjA5MDk0MDQ1NH0.QaPVpVqvOe4Sh8brJge7JZzFhB23gt_gvtSqgBVkZ1Y';

function fCRC(n) {
  return '₡' + Number(n||0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copiarTexto(txt, btn) {
  navigator.clipboard.writeText(txt).catch(() => {});
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✅';
    btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  }
}

function snack(msg, ok=true) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.className = 'show ' + (ok ? 'ok' : 'err');
  clearTimeout(snack._t);
  snack._t = setTimeout(() => { el.className = ''; }, 2400);
}

// UUID from ?id= (404 redirect) or ?k= (legacy)
const params = new URLSearchParams(location.search);
const cotId = params.get('id') || params.get('k');

function showError(txt) {
  document.getElementById('appRoot').innerHTML = `
    <div class="empty">
      <div class="icon">⚠️</div>
      <p>${esc(txt)}<br>Pedile a tu taller que te reenvíe el link.</p>
    </div>`;
}

async function cargar() {
  if (!cotId) { showError('Link inválido o expirado.'); return; }
  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(cotId)) {
    showError('Link inválido o expirado.');
    return;
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(cotId)}&select=*,clientes(nombre,apellido),vehiculos(patente,modelo,anio,marca,version,color)`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    const row = rows[0];
    if (!row) { showError('Cotización no encontrada.'); return; }

    // Loguear apertura del cliente (fire-and-forget, no bloquea el render)
    fetch(`${SUPABASE_URL}/rest/v1/rpc/registrar_vista_cotizacion`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_cotizacion_id: cotId })
    }).catch(() => {});

    if (row.cliente_aprobado_at) {
      mostrarYaAprobado(row);
      return;
    }

    const tipoCambio = Number(row.tipo_cambio_usado) || 530;
    const clienteNombre = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || '';
    const vehiculoDesc = [row.vehiculos?.patente, row.vehiculos?.modelo, row.vehiculos?.anio].filter(Boolean).join(' · ');

    const payload = {
      _cotizacionId: row.id,
      taller: 'Taller Ramos y Ramos',
      cliente: {
        nombre: clienteNombre,
        vehiculo: vehiculoDesc,
        orden: row.orden_id || '',
        patente: row.vehiculos?.patente || '',
        modelo: row.vehiculos?.modelo || '',
        version: row.vehiculos?.version || '',
        anio: row.vehiculos?.anio || '',
        color: row.vehiculos?.color || '',
        createdAt: row.created_at || '',
        tieneVehiculo: !!row.vehiculos,
      },
      repuestos: (row.repuestos || [])
        .map(r => ({
          nombre: r.nombre || '',
          _np: r.numero_parte || r.nParte || '',
          cantidad: r.cantidad || 1,
          prioridad: r.prioridad || 'Recomendado',
          nota: r.nota || '',
          opciones: (r.opciones || [])
            .filter(op => (Number(op.precioUSD) || 0) > 0)
            .map(op => ({
              calidad: op.calidad || '',
              estado: op.estado || '',
              origen: op.origen || 'usa',
              marca: op.marca || '',
              garantia: op.garantia || '',
              precioFinalCRC: Number(op.precioFinalCRC) > 0
                ? Number(op.precioFinalCRC)
                : Math.round(((Number(op.precioUSD) || 0) + (Number(op.transUSD) || 0)) * tipoCambio * (r.cantidad || 1)),
            })),
        }))
        .filter(r => r.opciones.length > 0),
    };

    iniciar(payload);
  } catch(e) {
    showError('No se pudo cargar la cotización. Intentá de nuevo.');
  }
}

function mostrarYaAprobado(row) {
  const clienteNombre = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || '';
  const fecha = row.cliente_aprobado_at
    ? new Date(row.cliente_aprobado_at).toLocaleDateString('es-CR', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';
  document.getElementById('appRoot').innerHTML = `
    <div class="cliente-hero" style="margin-top:16px;">
      <div style="font-size:3rem;margin-bottom:12px;">✅</div>
      <h2>¡Cotización ya aprobada!</h2>
      ${clienteNombre ? `<p style="margin-top:10px;">${esc(clienteNombre)}</p>` : ''}
      ${fecha ? `<p style="color:var(--muted);font-size:13px;margin-top:6px;">Aprobada el ${esc(fecha)}</p>` : ''}
    </div>
    <div class="card" style="text-align:center;color:var(--muted);padding:24px;">
      <p>Tu selección ya fue registrada. El taller se pondrá en contacto con vos para coordinar el pago y la entrega.</p>
      <p style="margin-top:12px;font-size:13px;">Si tenés alguna consulta, contactanos por WhatsApp al <strong style="color:var(--texto);">8887-2667</strong>.</p>
    </div>
    <div style="background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:20px;margin-top:16px;text-align:center;">
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5;">
        Si necesitás modificar tu selección, contactanos. El taller puede reabrir tu cotización para que la apruebes nuevamente.
      </div>
      <a href="#" id="btnContactarTaller"
         style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:var(--navy);color:var(--card);border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;">
        📞 Necesito modificar mi selección
      </a>
    </div>`;

  setTimeout(() => {
    const btn = document.getElementById('btnContactarTaller');
    if (!btn) return;
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const cN = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || 'Cliente';
      const veh = [row.vehiculos?.patente, row.vehiculos?.modelo, row.vehiculos?.anio].filter(Boolean).join(' · ') || row.cliente_vehiculo || '';
      const cotizacionUrl = `https://cotizaciones.ramosyramoscr.com/c/${row.id}`;
      const mensaje = `🔄 *Solicitud de modificación*\n\nCliente: ${cN}${veh ? `\nVehículo: ${veh}` : ''}\nCotización: ${cotizacionUrl}\n\nNecesito hacer cambios en mi selección antes del pedido.`;
      window.open(`https://wa.me/50688872667?text=${encodeURIComponent(mensaje)}`, '_blank');
    });
  }, 0);
}

cargar();

  const { taller, cliente, repuestos: reps } = payload;
  const _headerSub = document.getElementById('headerSub');
  if (_headerSub && cliente.nombre) _headerSub.textContent = 'Cotización confeccionada para ' + cliente.nombre;
  const sel = new Array(reps.length).fill(null);

  const pagoHTML = `
  <div style="background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:20px;margin-top:20px;">
    <div style="font-family:'Titillium Web',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--rojo);margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <span style="display:inline-block;width:3px;height:16px;background:var(--rojo);border-radius:2px;"></span>
      Instrucciones de pago
    </div>
    <div style="background:var(--card2);border:1px solid var(--borde);border-radius:10px;padding:14px;margin-bottom:16px;font-size:14px;line-height:1.6;">
      Para proceder con el pedido se requiere el <strong>50% del costo</strong> de los repuestos como adelanto.<br>
      El adelanto o cancelación total se puede realizar por <strong>transferencia, SINPE o efectivo</strong>, y con <strong>tarjeta de crédito</strong> en días hábiles en nuestro establecimiento.
    </div>
    <div class="pago-grid-2col" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style="background:var(--card2);border:1px solid var(--borde);border-radius:10px;padding:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">🏦 Cuenta BAC Colones</div>
        <div style="font-size:13px;line-height:2;color:var(--texto);">
          <div><span style="color:var(--muted);">Cliente:</span> Gustavo Adolfo Ramos Fallas</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="color:var(--muted);">N° cuenta:</span> <strong>935377267</strong>
            <button onclick="copiarTexto('935377267', this)" style="background:none;border:1px solid var(--borde);border-radius:6px;padding:6px 12px;font-size:12px;min-height:32px;color:var(--muted);cursor:pointer;">📋</button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="color:var(--muted);">IBAN:</span> <strong>CR82010200009353772678</strong>
            <button onclick="copiarTexto('CR82010200009353772678', this)" style="background:none;border:1px solid var(--borde);border-radius:6px;padding:6px 12px;font-size:12px;min-height:32px;color:var(--muted);cursor:pointer;">📋</button>
          </div>
        </div>
      </div>
      <div style="background:var(--card2);border:1px solid var(--borde);border-radius:10px;padding:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">💵 Cuenta BAC Dólares</div>
        <div style="font-size:13px;line-height:2;color:var(--texto);">
          <div><span style="color:var(--muted);">Cliente:</span> Gustavo Adolfo Ramos Fallas</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="color:var(--muted);">N° cuenta:</span> <strong>940809213</strong>
            <button onclick="copiarTexto('940809213', this)" style="background:none;border:1px solid var(--borde);border-radius:6px;padding:6px 12px;font-size:12px;min-height:32px;color:var(--muted);cursor:pointer;">📋</button>
          </div>

    document.getElementById('btnModalVolver').addEventListener('click', () => overlay.remove());
    document.getElementById('btnModalConfirmar').addEventListener('click', () => { overlay.remove(); confirmarAprobacion(); });
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    const escHandler = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
    document.addEventListener('keydown', escHandler);
  }

  window.confirmarAprobacion = function() {
    const modal = document.createElement('div');
    modal.id = 'modalInstalacion';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;';
    modal.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--borde);border-radius:16px;padding:28px;max-width:400px;width:100%;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">🔧</div>
        <div style="font-family:'Titillium Web',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--rojo);margin-bottom:10px;">Mano de obra</div>
        <p style="font-size:14px;color:var(--texto);line-height:1.6;margin-bottom:24px;">¿Deseás agregar el costo de mano de obra a la proforma oficial?</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="procesarAprobacion(true)" style="background:var(--rojo);color:var(--card);border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;">Sí, incluir instalación</button>
          <button onclick="procesarAprobacion(false)" style="background:var(--card2);color:var(--texto);border:1px solid var(--borde);border-radius:10px;padding:14px;font-size:14px;cursor:pointer;">No, solo los repuestos</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  };

  window.procesarAprobacion = async function(conInstalacion) {
    document.getElementById('modalInstalacion')?.remove();
    const aprobados = reps.map((r,ri) => ({r, oi: sel[ri]})).filter(x => x.oi !== null && x.oi >= 0);
    const total = aprobados.reduce((sum,x) => sum + x.r.opciones[x.oi].precioFinalCRC, 0);
    const adelantoMin = Math.round(total * 0.5);

    const optPago = document.querySelector('input[name="pago_opt"]:checked')?.value || 'adelanto';
    let montoPago = adelantoMin;
    if (optPago === 'total') {
      montoPago = total;
    } else if (optPago === 'otro') {
      const inp = parseInt(document.getElementById('inp_otro_monto')?.value, 10) || 0;
      if (inp < adelantoMin || inp > total) {
        const err = document.getElementById('inp_otro_error');
        if (err) err.style.display = 'block';
        return;
      }
      montoPago = inp;
    }
    const labelPago = optPago === 'total' ? 'Pago total' : optPago === 'otro' ? 'Monto personalizado' : 'Adelanto mínimo (50%)';

    const btn = document.getElementById('btnConfirmar');
    const status = document.getElementById('confirmStatus');
    if (btn) btn.disabled = true;
    if (status) status.innerHTML = `<p style="color:var(--muted);font-size:13px;">⏳ Guardando tu selección...</p>`;

    // Open WA window before any await (iOS Safari requirement)
    const waWin = window.open('', '_blank');

    try {
      const clienteSeleccion = sel.map((oi, ri) => {
        if (oi !== null && oi >= 0) return { repuesto_idx: ri, opcion_idx: oi, rejected: false };
        if (oi === -1) return { repuesto_idx: ri, rejected: true };
        return { repuesto_idx: ri, rejected: true }; // null = rechazo implícito
      });

      const ALREADY_APPROVED = ['aprobado','en_camino','listo','agendado','en_taller','cobrado'];
      if (payload._cotizacionId) {
        try {
          const chkRes = await fetch(`${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(payload._cotizacionId)}&select=cliente_aprobado_at,estado`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
          });
          const [fresh] = await chkRes.json();
          if (fresh && (fresh.cliente_aprobado_at || ALREADY_APPROVED.includes(fresh.estado))) {
            if (btn) btn.disabled = false;
            if (waWin) waWin.close();
            alert('Esta cotización ya fue aprobada. Recargá la página para ver el estado actualizado.');
            window.location.reload();
            return;
          }
        } catch(e) { /* fail open */ }
      }

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(payload._cotizacionId)}`,
        {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            cliente_seleccion: clienteSeleccion,
            cliente_aprobado_at: new Date().toISOString(),
            adelanto_requerido_calc: adelantoMin,
            adelanto_requerido: adelantoMin,
            total_aprobado_calc: total,
            total_aprobado: total,
            estado: 'aprobado',
          }),
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);

      fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({
          to_user_nombres: ['Gustavo Ramos', 'Joseline Guzman'],
          event_type: 'cotizacion_aprobada',
          title: '👤 Cliente aprobó cotización',
          body: `${cliente.vehiculo || cliente.nombre || ''}`,
          url: '/repuestos',
          tag: `cotizacion-aprobada-${payload._cotizacionId}`,
        }),
      }).catch(() => {});

      if (status) status.innerHTML = `
        <p style="color:var(--success);font-size:13px;margin-bottom:10px;">✅ ¡Selección confirmada!</p>
        <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:10px;padding:14px;font-size:13px;color:var(--warn);text-align:left;line-height:1.6;">
          💳 <strong>Recordá que el adelanto del 50% es requisito para realizar el pedido.</strong><br>
          Por favor enviá el comprobante de pago al taller por WhatsApp para confirmar tu pedido.
        </div>`;

      // WhatsApp message — only sent after successful save
      let msg = `✅ *Aprobación de cotización – Taller Ramos y Ramos*\n`;
      msg += `📋 N°: ${cliente.orden || '—'}\n`;
      msg += `👤 Cliente: ${cliente.nombre}\n`;
      if (cliente.vehiculo) msg += `🚗 Vehículo: ${cliente.vehiculo}\n`;
      msg += `\n*Repuestos aprobados:*\n`;
      aprobados.forEach(({r, oi}) => {
        const op = r.opciones[oi];
        msg += `• ${r.nombre}${r.cantidad > 1 ? ' (×' + r.cantidad + ')' : ''}\n`;
        msg += `  → ${op.calidad} / ${op.estado}${op.marca ? ' · ' + op.marca : ''}\n`;
        if (op.garantia) msg += `  → 🛡️ ${op.garantia}\n`;
        msg += `  → ${fCRC(op.precioFinalCRC)}\n`;
      });
      msg += `\n💰 *Total aprobado: ${fCRC(total)}*\n`;
      msg += `💵 Monto a pagar (${labelPago}): ${fCRC(montoPago)}\n`;
      msg += `🔧 Instalación: ${conInstalacion ? 'Sí, incluir instalación' : 'No'}\n`;
      msg += `\n_Enviado desde el formulario de aprobación Taller Ramos y Ramos_`;
      const waUrl = 'https://wa.me/50688872667?text=' + encodeURIComponent(msg);
      if (waWin) {
        waWin.location.href = waUrl;
      } else {
        window.open(waUrl, '_blank');
      }
    } catch(e) {
      if (status) status.innerHTML = `<p style="color:var(--rojo);font-size:13px;">⚠️ Error al guardar: ${esc(e.message)}</p>`;
      if (btn) btn.disabled = false;
      if (waWin) waWin.close();
    }
  };

  render();
}
</script>
</body>
</html>
