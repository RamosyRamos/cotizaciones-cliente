<html lang="es">
<head>

  <title>Taller Ramos y Ramos – Tu Cotización</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fondo:    #E6E4DB;
      --negro:    #1A1A1D;
      --card:     #FCFBF8;
      --card2:    #F2F0E9;
      --borde:    #D6D3C8;
      --borde-activo: #444;
      --texto:    #1A1A1D;
      --muted:    #8A8C86;
      --success:  #1F7A4D;
      --rojo:     #B83A2E;
      --rojo-dark:#8F2A20;
      --rojo-glow:rgba(184,58,46,0.10);
      --navy:     #15225F;
      --dim:      #5C5C62;
      --line2:    #E4E1D8;
      --warn:        #8A5A0A;
      --warn-bg:     #FBF3E0;
      --warn-border: #D9B870;
      --crit-bg:      #F7E0DC;
      --crit-border:  #D99B92;
      --ok-tag-bg:    #E0F0E6;
      --ok-tag-border:#9BCBAE;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Titillium Web', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; }

    .header {
      background: var(--card);
      padding: 16px 24px; display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .header::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0;
      height: 3px; background: linear-gradient(90deg, var(--navy), var(--rojo) 55%, transparent);
    }
    .logo {
      width: 44px; height: 44px;
      border-radius: 10px; flex-shrink: 0;
      object-fit: contain;
    }
    .header h1 { font-family: 'Titillium Web', sans-serif; font-size: 24px; letter-spacing: 2px; line-height: 1; color: var(--texto); }
    .header p { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .vip-badge {
      display: none;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #C9A24B, #E0C476);
      color: #1a1205;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 80px; }

    .card {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 18px;
    }
    .card-title {
      font-family: 'Titillium Web', sans-serif; font-size: 16px; letter-spacing: 1.5px;
      color: var(--rojo); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; width: 3px; height: 16px; background: var(--rojo);
      border-radius: 2px; display: inline-block;
    }

    .tag {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .tag-critico, .tag-crítico, .tag-cr\00EDtico { background: var(--crit-bg); color: var(--rojo); border: 1px solid var(--crit-border); }
    .tag-recomendado { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
    .tag-opcional { background: var(--ok-tag-bg); color: var(--success); border: 1px solid var(--ok-tag-border); }

    .mf{display:inline-block;width:16px;height:11px;border-radius:1.5px;overflow:hidden;border:.5px solid rgba(0,0,0,.12);vertical-align:-1px;position:relative}
    .mf.us{background:repeating-linear-gradient(#b22234 0 1.57px,#fff 1.57px 3.14px)}
    .mf.us::after{content:'';position:absolute;top:0;left:0;width:42%;height:55%;background:#3c3b6e}
    .mf.eu{background:
      radial-gradient(circle 0.8px at 50% 16%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 74% 27%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 83% 50%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 74% 73%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 50% 84%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 26% 73%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 17% 50%, #FFCC00 97%, transparent 100%),
      radial-gradient(circle 0.8px at 26% 27%, #FFCC00 97%, transparent 100%),
      #003399}
    .mf.eu::after{content:''}

    .cliente-hero {
      background: var(--card);
      border: 1px solid var(--borde); border-radius: 14px;
      padding: 24px; margin-bottom: 20px; text-align: center;
    }
    .cliente-hero h2 { font-family: 'Titillium Web', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--texto); }
    .cliente-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .cliente-hero .taller-name { color: var(--rojo); font-weight: 700; }

    .instrucciones {
      background: var(--card2); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 20px; font-size: 14px;
    }

    .cliente-repuesto {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 16px;
      transition: border-color 0.25s, background 0.25s;
    }
    .cliente-repuesto.tiene-seleccion { border-color: var(--success); background: color-mix(in srgb, var(--success) 7%, transparent); }
    .cliente-repuesto-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .cliente-repuesto-nombre { font-weight: 700; font-size: 17px; }
    .cliente-repuesto-nota { font-size: 13px; color: var(--muted); margin-top: 5px; font-style: italic; }

    .opciones-cliente { display: flex; flex-direction: column; gap: 8px; }
    .opcion-cliente {
      display: flex; align-items: center; gap: 12px;
      background: var(--card2); border: 1.5px solid var(--borde);
      border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.2s;
    }
    .opcion-cliente:hover { border-color: var(--borde-activo); }
    .opcion-cliente.seleccionada { border-color: var(--success); background: color-mix(in srgb, var(--success) 7%, transparent); }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--borde-activo); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .opcion-cliente.seleccionada .radio-dot { border-color: var(--success); background: var(--success); }
    .radio-dot::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: var(--card); display: none;
    }
    .opcion-cliente.seleccionada .radio-dot::after { display: block; }
    .opcion-cliente-info { flex: 1; }
    .opcion-cliente-titulo { font-weight: 600; font-size: 14px; }
    .opcion-cliente-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .opcion-cliente-precio {
      font-family: 'Titillium Web', sans-serif; font-size: 20px;
      color: var(--success); letter-spacing: 0.5px; white-space: nowrap;
    }
    .no-seleccionar {
      display: flex; align-items: center; gap: 12px;
      background: transparent; border: 1.5px dashed var(--borde);
      border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .no-seleccionar:hover { border-color: var(--borde-activo); }
    .no-seleccionar.seleccionada { border-color: var(--muted); background: var(--card2); }
    .no-seleccionar span { font-size: 13px; color: var(--muted); }

    .resumen-box {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-top: 20px;
    }
    .resumen-box h3 { font-family: 'Titillium Web', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--rojo); margin-bottom: 16px; }
    .resumen-item { padding: 12px 0; border-bottom: 1px solid var(--borde); }
    .resumen-item:last-of-type { border-bottom: none; }
    .resumen-item-nombre { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .resumen-item-det { font-size: 14px; color: var(--muted); }
    .resumen-item-precio { font-family: 'Titillium Web', sans-serif; font-size: 20px; color: var(--success); }
    .resumen-total {
      background: var(--card2); border: 1px solid var(--borde);
      border-radius: 10px; padding: 14px; margin-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .resumen-total span { font-weight: 700; font-size: 15px; }
    .resumen-total .monto-total { font-family: 'Titillium Web', sans-serif; font-size: 30px; color: var(--texto); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; min-height: 44px; border: none; border-radius: 8px;
      font-family: 'Titillium Web', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-wa { background: #25D366; color: #fff; }
    .btn-wa:hover { filter: brightness(1.12); }
    .btn-wa:disabled { background: var(--muted); color: var(--card); filter: none; cursor: not-allowed; }
    /* Confirmar selección: ya no abre WhatsApp — navy propio, no reusar .btn-wa */
    .btn-navy { background: var(--navy); color: #fff; }
    .btn-navy:hover { filter: brightness(1.3); }
    .btn-navy:disabled { background: var(--muted); color: var(--card); filter: none; cursor: not-allowed; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    #snackbar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 13px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #snackbar.show { opacity: 1; }
    #snackbar.ok { background: var(--success); color: var(--card); }
    #snackbar.err { background: var(--rojo); color: var(--card); }

    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .btn { width: 100%; justify-content: center; }
      .resumen-total { flex-direction: column; gap: 6px; text-align: center; }
    }
    @media (max-width: 600px) {
      .pago-grid-2col { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 480px) {
      .header { padding: 12px 16px; gap: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <img src="logo-1x.png" srcset="logo-1x.png 1x, logo-2x.png 2x, logo-3x.png 3x" alt="Taller Ramos y Ramos" class="logo">
  <div>
    <h1>Taller Ramos y Ramos</h1>
    <p id="headerSub">Tu cotización personalizada</p>
    <div id="vipBadge" class="vip-badge">★ Precio VIP / Al costo</div>
  </div>
</div>

<div class="wrap" id="appRoot">
  <div class="empty"><div class="icon">⏳</div><p>Cargando tu cotización...</p></div>
</div>
<div id="snackbar"></div>

<script>
const SUPABASE_URL = 'https://lnsglpvobvfzbxpmyagc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxuc2dscHZvYnZmemJ4cG15YWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ0NTQsImV4cCI6MjA5MDk0MDQ1NH0.QaPVpVqvOe4Sh8brJge7JZzFhB23gt_gvtSqgBVkZ1Y';

function fCRC(n) {
  return '₡' + Number(n||0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copiarTexto(txt, btn) {
  navigator.clipboard.writeText(txt).catch(() => {});
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✅';
    btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  }
}

function snack(msg, ok=true) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.className = 'show ' + (ok ? 'ok' : 'err');
  clearTimeout(snack._t);
  snack._t = setTimeout(() => { el.className = ''; }, 2400);
}

// UUID from ?id= (404 redirect) or ?k= (legacy)
const params = new URLSearchParams(location.search);
const cotId = params.get('id') || params.get('k');

function showError(txt) {
  document.getElementById('appRoot').innerHTML = `
    <div class="empty">
      <div class="icon">⚠️</div>
      <p>${esc(txt)}<br>Pedile a tu taller que te reenvíe el link.</p>
    </div>`;
}

async function cargar() {
  if (!cotId) { showError('Link inválido o expirado.'); return; }
  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(cotId)) {
    showError('Link inválido o expirado.');
    return;
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(cotId)}&select=*,clientes(nombre,apellido),vehiculos(patente,modelo,anio,marca,version,color,vin)`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    const row = rows[0];
    if (!row) { showError('Cotización no encontrada.'); return; }
    if (row.es_vip) document.getElementById('vipBadge').style.display = 'inline-block';

    // Loguear apertura del cliente (fire-and-forget, no bloquea el render)
    fetch(`${SUPABASE_URL}/rest/v1/rpc/registrar_vista_cotizacion`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_cotizacion_id: cotId })
    }).catch(() => {});

    if (row.cliente_aprobado_at) {
      mostrarYaAprobado(row);
      return;
    }

    const tipoCambio = Number(row.tipo_cambio_usado) || 530;
    const clienteNombre = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || '';
    const vehiculoDesc = [row.vehiculos?.patente, row.vehiculos?.modelo, row.vehiculos?.anio].filter(Boolean).join(' · ');

    const payload = {
      _cotizacionId: row.id,
      taller: 'Taller Ramos y Ramos',
      imagenesCliente: Array.isArray(row.imagenes_cliente) ? row.imagenes_cliente : [],
      cliente: {
        nombre: clienteNombre,
        vehiculo: vehiculoDesc,
        orden: row.orden_id || '',
        patente: row.vehiculos?.patente || '',
        modelo: row.vehiculos?.modelo || '',
        version: row.vehiculos?.version || '',
        anio: row.vehiculos?.anio || '',
        color: row.vehiculos?.color || '',
        vin: row.vehiculos?.vin || '',
        createdAt: row.created_at || '',
        fechaCotizacion: row.estado_changed_at || row.created_at || '',
        estado: row.estado || '',
        tieneVehiculo: !!row.vehiculos,
      },
      repuestos: (row.repuestos || [])
        .map(r => ({
          nombre: r.nombre || '',
          _np: r.numero_parte || r.nParte || '',
          cantidad: r.cantidad || 1,
          prioridad: r.prioridad || 'Recomendado',
          nota: r.nota || '',
          opciones: (r.opciones || [])
            .filter(op => (Number(op.precioUSD) || 0) > 0)
            .map(op => ({
              calidad: op.calidad || '',
              estado: op.estado || '',
              origen: op.origen || 'usa',
              marca: op.marca || '',
              garantia: op.garantia || '',
              precioFinalCRC: Number(op.precioFinalCRC) > 0
                ? Number(op.precioFinalCRC)
                : Math.round(((Number(op.precioUSD) || 0) + (Number(op.transUSD) || 0)) * tipoCambio * (r.cantidad || 1)),
            })),
        }))
        .filter(r => r.opciones.length > 0),
    };

    iniciar(payload);
  } catch(e) {
    showError('No se pudo cargar la cotización. Intentá de nuevo.');
  }
}

function mostrarYaAprobado(row) {
  const clienteNombre = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || '';
  const fecha = row.cliente_aprobado_at
    ? new Date(row.cliente_aprobado_at).toLocaleDateString('es-CR', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';
  const estado = row.estado || '';
  // Los _calc se limpian cuando la cotización avanza; leer el canónico primero.
  const total = Number(row.total_aprobado ?? row.total_aprobado_calc ?? 0);
  const adelantoReq = Number(row.adelanto_requerido_calc ?? Math.round(total * 0.5));
  const adelantoPagado = Number(row.adelanto_realizado ?? 0);
  const faltaAdelanto = Math.max(0, adelantoReq - adelantoPagado);   // contra el 50%, no contra el total
  const saldoTotal = Math.max(0, total - adelantoPagado);            // línea gris informativa (contra entrega)
  // Solo en 'aprobado' el cliente aún puede deber el adelanto → mostrar cuentas.
  // En 'en_camino'/'cobrado'/etc. el pago ya se coordinó → seguimiento.
  const pendienteAdelanto = estado === 'aprobado';

  // Selección aprobada, reconstruida de cliente_seleccion + repuestos (null-safe:
  // el camino manual puede dejar entradas null en el array).
  const aprobadosSel = (Array.isArray(row.cliente_seleccion) ? row.cliente_seleccion : [])
    .filter(s => s && s.rejected === false)
    .map(s => {
      const rep = (row.repuestos || [])[s.repuesto_idx];
      const op = rep && Array.isArray(rep.opciones) ? rep.opciones[s.opcion_idx] : null;
      return rep ? { rep, op } : null;
    })
    .filter(Boolean);

  const seleccionHTML = pendienteAdelanto && aprobadosSel.length > 0 ? `
    <div style="background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:20px;margin-top:16px;">
      <div style="font-family:'Titillium Web',sans-serif;font-size:15px;letter-spacing:1.2px;color:var(--navy);margin-bottom:12px;">Resumen de tu pedido</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${aprobadosSel.map(({ rep, op }) => `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;font-size:13px;border-bottom:1px solid var(--borde);padding-bottom:8px;">
            <div style="color:var(--texto);">
              ${esc(rep.nombre || '')}${(rep.cantidad || 1) > 1 ? ` <span style="color:var(--muted);">× ${rep.cantidad}</span>` : ''}
              ${op ? `<div style="color:var(--muted);font-size:12px;margin-top:2px;">${esc([op.calidad, op.marca].filter(Boolean).join(' · '))}</div>` : ''}
            </div>
            ${op && op.precioFinalCRC != null ? `<div style="color:var(--texto);white-space:nowrap;">${fCRC(op.precioFinalCRC)}</div>` : ''}
          </div>`).join('')}
      </div>
      ${row.con_instalacion != null ? `
      <div style="font-size:12.5px;color:var(--muted);margin-top:10px;">${row.con_instalacion ? '🔧 Con instalación en el taller' : 'Solo repuestos'}</div>` : ''}
    </div>` : '';

  // Botón "enviar comprobante" (solo casos con pago pendiente A1/A2) — gesto
  // directo del usuario, sin el pre-open de iOS que usaba el WA automático.
  const btnComprobanteHTML = `
    <div style="text-align:center;margin-top:16px;">
      <a href="#" id="btnComprobante"
         style="display:inline-flex;align-items:center;gap:8px;padding:13px 22px;background:#25D366;color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;">

  document.getElementById('appRoot').innerHTML = heroHTML + cuerpoHTML + contactoHTML;

    const cN = [row.clientes?.nombre, row.clientes?.apellido].filter(Boolean).join(' ') || row.cliente_nombre || 'Cliente';
    const veh = [row.vehiculos?.patente, row.vehiculos?.modelo, row.vehiculos?.anio].filter(Boolean).join(' · ') || row.cliente_vehiculo || '';

    const btn = document.getElementById('btnContactarTaller');
    if (btn) btn.addEventListener('click', function(e) {

        : `💬 *Consulta sobre mi pedido*\n\nCliente: ${cN}${veh ? `\nVehículo: ${veh}` : ''}\nCotización: ${cotizacionUrl}`;
      window.open(`https://wa.me/50688872667?text=${encodeURIComponent(mensaje)}`, '_blank');
    });

    const PAGO_LABELS = { adelanto: 'adelanto 50%', total: 'pago total', otro: 'monto personalizado' };
    const btnC = document.getElementById('btnComprobante');
    if (btnC) btnC.addEventListener('click', function(e) {

      // Resumen completo (el que mandaba el WA automático pre-ea92dd6),
      // reconstruido de aprobadosSel. Históricas: sin selección/decisión → se
      // omiten esas líneas y queda el resumen corto de siempre.
      const lineas = aprobadosSel.map(({ rep, op }) => {
        let l = `• ${rep.nombre || 'Repuesto'}${(rep.cantidad || 1) > 1 ? ' (×' + rep.cantidad + ')' : ''}`;
        if (op) {
          const specs = [op.calidad, op.estado].filter(Boolean).join(' / ');
          if (specs || op.marca) l += `\n  → ${specs}${op.marca ? (specs ? ' · ' : '') + op.marca : ''}`;
          if (op.garantia) l += `\n  → 🛡️ ${op.garantia}`;
          if (op.precioFinalCRC != null) l += `\n  → ${fCRC(op.precioFinalCRC)}`;
        }
        return l;
      });
      const armar = (incluidas) => {
        let m = `✅ *Aprobación de cotización – Taller Ramos y Ramos*\n👤 Cliente: ${cN}`;
        if (veh) m += `\n🚗 Vehículo: ${veh}`;
        if (incluidas.length > 0) {
          m += `\n\n*Repuestos aprobados:*\n${incluidas.join('\n')}`;
          if (incluidas.length < lineas.length) m += `\n… y ${lineas.length - incluidas.length} más`;
        }
        m += `\n\n💰 *Total aprobado: ${fCRC(total)}*`;
        if (row.monto_pago_elegido != null) m += `\n💵 Monto a pagar: ${fCRC(row.monto_pago_elegido)}${row.pago_elegido ? ` (${PAGO_LABELS[row.pago_elegido] || row.pago_elegido})` : ''}`;
        if (row.con_instalacion != null) m += `\n🔧 Instalación: ${row.con_instalacion ? 'Sí' : 'No'}`;
        m += `\n\nAdjunto el comprobante de la transferencia.`;
        return m;
      };
      // wa.me tolera ~2000 chars de URL: truncar la lista ("… y N más")
      // hasta caber, conservando siempre total/monto/cierre.
      const incluidas = lineas.slice();
      let url = `https://wa.me/50688872667?text=${encodeURIComponent(armar(incluidas))}`;
      while (url.length > 1900 && incluidas.length > 0) {
        incluidas.pop();
        url = `https://wa.me/50688872667?text=${encodeURIComponent(armar(incluidas))}`;
      }
      window.open(url, '_blank');
    });
  }, 0);
}

  function folioNum(orden) {
    const s = String(orden || '').trim();
    if (!s.startsWith('INT-#')) return '';   // solo el consecutivo real de la calculadora
    const n = s.slice(5);                     // quita el prefijo "INT-#"
    return n ? '#' + n : '';
  }

  function render() {
    const tieneVeh = cliente.tieneVehiculo;
    const modeloNombre = (cliente.modelo || '').replace(/\s*\d{4}\s*[-–]\s*(\d{4}|presente|present|actual|hoy)?\s*$/i, '').trim();

    const hero = `${heroCard}

      <b style="color:var(--warn);font-weight:700;">Esta cotización aún no es una proforma oficial.</b> Elegí los repuestos que querés aprobar y te enviamos la proforma final con el detalle.

    const galeriaHTML = (Array.isArray(imagenesCliente) && imagenesCliente.length > 0)
      ? `<div style="background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:20px;margin-bottom:20px;">

          <div style="display:flex;flex-direction:column;gap:16px;">
            ${imagenesCliente.map(it => `

    const instrucciones = `

    const repsHTML = reps.map((r, ri) => {
      const selIdx = sel[ri];

    const algunoAprobado = sel.some(s => s !== null && s >= 0);

                <div class="resumen-item-det">${esc(op.calidad)} · ${esc(op.estado)}${op.marca?' · '+esc(op.marca):''}${op.garantia?' · 🛡️ '+esc(op.garantia):''}</div>

        <div class="resumen-total">
          <span>Total aprobado</span>
          <span class="monto-total">${fCRC(total)}</span>
        </div>

        <div style="background:var(--card2);border:1px solid var(--borde);border-radius:10px;padding:16px;margin-top:12px;">
          <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;">💳 ¿Cuánto deseás abonar?</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:1.5px solid var(--borde);border-radius:8px;" id="opt_adelanto">
              <input type="radio" name="pago_opt" value="adelanto" checked onchange="actualizarPago(${total})" style="accent-color:var(--rojo);width:16px;height:16px;">
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">Adelanto mínimo (50%)</div>
                <div style="color:var(--success);font-family:'Titillium Web',sans-serif;font-size:20px;letter-spacing:1px;">${fCRC(Math.round(total * 0.5))}</div>
              </div>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:1.5px solid var(--borde);border-radius:8px;" id="opt_total">
              <input type="radio" name="pago_opt" value="total" onchange="actualizarPago(${total})" style="accent-color:var(--rojo);width:16px;height:16px;">
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">Pago total</div>
                <div style="color:var(--success);font-family:'Titillium Web',sans-serif;font-size:20px;letter-spacing:1px;">${fCRC(total)}</div>
              </div>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:1.5px solid var(--borde);border-radius:8px;" id="opt_otro">
              <input type="radio" name="pago_opt" value="otro" onchange="actualizarPago(${total})" style="accent-color:var(--rojo);width:16px;height:16px;">
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">Otro monto</div>
                <div style="font-size:12px;color:var(--muted);">Mínimo ${fCRC(Math.round(total * 0.5))}</div>

            </label>
            <div id="otro_monto_wrap" style="display:none;padding:0 4px;">
              <input id="inp_otro_monto" type="number" min="${Math.round(total*0.5)}" max="${total}" step="1000"
                placeholder="Ingresá el monto en colones"
                style="width:100%;background:var(--card);border:1px solid var(--borde);border-radius:8px;padding:10px;color:var(--texto);font-size:14px;">
              <div id="inp_otro_error" style="font-size:12px;color:var(--rojo);margin-top:4px;display:none;">El monto debe ser entre ${fCRC(Math.round(total*0.5))} y ${fCRC(total)}.</div>
            </div>
          </div>
        </div>

        <div class="row" style="margin-top:18px;">
          <button class="btn btn-navy" id="btnConfirmar" onclick="handleSubmitClick()">
            Confirmar selección
          </button>
        </div>
        <div id="confirmStatus" style="margin-top:10px;"></div>
      </div>`;

      window._aprobados = aprobados;
      window._total = total;

    } else {
      resumenHTML = `
      <div style="margin-top:20px;text-align:center;">
        <button class="btn btn-navy" disabled style="opacity:0.8;cursor:not-allowed;pointer-events:none;">
          Confirmar selección
        </button>
        <p style="font-size:13px;color:var(--muted);margin-top:8px;">Seleccioná al menos un repuesto para continuar</p>
      </div>`;
    }

    const consultaMsg = folio
      ? `Hola, tengo una consulta sobre mi cotización ${folio}`
      : `Hola, tengo una consulta sobre mi cotización a nombre de ${cliente.nombre}`;
    const consultaWa = 'https://wa.me/50683439257?text=' + encodeURIComponent(consultaMsg);
    const footer = `
    <div style="border-top:1px solid var(--borde);margin-top:20px;padding-top:22px;text-align:center;">
      <div style="font-size:15px;font-weight:700;color:var(--texto);">¿Tenés dudas sobre tu cotización?</div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:4px;">Escribinos y con gusto te ayudamos.</div>
      <div style="margin-top:14px;"><a href="${consultaWa}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;padding:11px 20px;min-height:44px;box-sizing:border-box;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;"><svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.524 5.847L0 24l6.302-1.502A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.373l-.36-.213-3.733.89.923-3.636-.234-.374A9.818 9.818 0 1112 21.818z"/></svg>Escribir al taller</a></div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:16px;">Taller Ramos y Ramos · San José, Costa Rica</div>
    </div>`;
    document.getElementById('appRoot').innerHTML = hero + galeriaHTML + (vencida ? bannerVencida : instrucciones) + repsHTML + (vencida ? '' : resumenHTML) + tiemposEntregaHTML() + footer;
  }

  window.seleccionar = function(ri, oi) {
    sel[ri] = oi;
    render();
  };

  window.actualizarPago = function(total) {
    const opt = document.querySelector('input[name="pago_opt"]:checked')?.value;
    const wrap = document.getElementById('otro_monto_wrap');
    if (wrap) wrap.style.display = opt === 'otro' ? 'block' : 'none';
  };

  window.handleSubmitClick = function() {
    if (vencida) return;  // red de seguridad: no aprobar cotizaciones vencidas
    const unmarked = [];
    for (let i = 0; i < reps.length; i++) {
      if (sel[i] === null) {
        unmarked.push(reps[i].nombre);
      }
    }
    if (unmarked.length === 0) {
      confirmarAprobacion();
    } else {
      showConfirmModal(unmarked);
    }
  };

  function showConfirmModal(unmarked) {
    const existing = document.getElementById('confirmModal');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'confirmModal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;';
    overlay.innerHTML = `
      <div id="modalContent" style="background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:24px;max-width:450px;width:100%;max-height:90vh;overflow-y:auto;box-sizing:border-box;">
        <div style="font-weight:600;font-size:17px;color:var(--texto);margin-bottom:14px;">Repuestos sin seleccionar</div>
        <p style="font-size:14px;color:var(--muted);margin-bottom:12px;line-height:1.5;">Los siguientes repuestos no fueron seleccionados y se tomarán como rechazados:</p>
        <ul style="padding-left:20px;color:var(--texto);line-height:1.8;margin:0 0 4px;">
          ${unmarked.map(n => `<li>${esc(n)}</li>`).join('')}
        </ul>
        <p style="margin-top:18px;font-weight:500;color:var(--texto);font-size:15px;">¿Confirmar y enviar?</p>
        <div id="modalBtnRow" style="margin-top:22px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
          <button id="btnModalVolver" style="background:var(--card2);color:var(--texto);padding:11px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px;min-width:100px;">Volver</button>
          <button id="btnModalConfirmar" style="background:var(--rojo);color:var(--card);padding:11px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:600;min-width:140px;">Confirmar y enviar</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    if (window.innerWidth < 480) {
      const btnRow = document.getElementById('modalBtnRow');
      btnRow.style.flexDirection = 'column-reverse';
      btnRow.querySelectorAll('button').forEach(b => { b.style.width = '100%'; b.style.padding = '12px 20px'; });
      document.getElementById('modalContent').style.padding = '20px';
    }

    document.getElementById('btnModalVolver').addEventListener('click', () => overlay.remove());
    document.getElementById('btnModalConfirmar').addEventListener('click', () => { overlay.remove(); confirmarAprobacion(); });
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    const escHandler = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
    document.addEventListener('keydown', escHandler);
  }

  window.confirmarAprobacion = function() {
    const modal = document.createElement('div');
    modal.id = 'modalInstalacion';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;';
    modal.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--borde);border-radius:16px;padding:28px;max-width:400px;width:100%;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">🔧</div>
        <div style="font-family:'Titillium Web',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--rojo);margin-bottom:10px;">Mano de obra</div>
        <p style="font-size:14px;color:var(--texto);line-height:1.6;margin-bottom:24px;">¿Deseás agregar el costo de mano de obra a la proforma oficial?</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="procesarAprobacion(true)" style="background:var(--rojo);color:var(--card);border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;">Sí, incluir instalación</button>
          <button onclick="procesarAprobacion(false)" style="background:var(--card2);color:var(--texto);border:1px solid var(--borde);border-radius:10px;padding:14px;font-size:14px;cursor:pointer;">No, solo los repuestos</button>
          <button onclick="document.getElementById('modalInstalacion').remove()" style="background:transparent;color:var(--muted);border:none;border-radius:10px;padding:14px;font-size:14px;cursor:pointer;">← Volver</button>
        </div>
      </div>`;
    // Cerrar tocando el fondo: solo si el tap fue en el overlay mismo,
    // no dentro de la tarjeta (los clicks internos no burbujean como e.target=modal).
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  };

  window.procesarAprobacion = async function(conInstalacion) {
    document.getElementById('modalInstalacion')?.remove();
    const aprobados = reps.map((r,ri) => ({r, oi: sel[ri]})).filter(x => x.oi !== null && x.oi >= 0);
    const total = aprobados.reduce((sum,x) => sum + x.r.opciones[x.oi].precioFinalCRC, 0);
    const adelantoMin = Math.round(total * 0.5);

    const optPago = document.querySelector('input[name="pago_opt"]:checked')?.value || 'adelanto';
    let montoPago = adelantoMin;
    if (optPago === 'total') {
      montoPago = total;
    } else if (optPago === 'otro') {
      const inp = parseInt(document.getElementById('inp_otro_monto')?.value, 10) || 0;
      if (inp < adelantoMin || inp > total) {
        const err = document.getElementById('inp_otro_error');
        if (err) err.style.display = 'block';
        return;
      }
      montoPago = inp;
    }
    const btn = document.getElementById('btnConfirmar');
    const status = document.getElementById('confirmStatus');
    if (btn) btn.disabled = true;
    if (status) status.innerHTML = `<p style="color:var(--muted);font-size:13px;">⏳ Guardando tu selección...</p>`;

    try {
      const clienteSeleccion = sel.map((oi, ri) => {
        if (oi !== null && oi >= 0) return { repuesto_idx: ri, opcion_idx: oi, rejected: false };
        if (oi === -1) return { repuesto_idx: ri, rejected: true };
        return { repuesto_idx: ri, rejected: true }; // null = rechazo implícito
      });

      const ALREADY_APPROVED = ['aprobado','en_camino','listo','agendado','en_taller','cobrado'];
      if (payload._cotizacionId) {
        try {
          const chkRes = await fetch(`${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(payload._cotizacionId)}&select=cliente_aprobado_at,estado`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
          });
          const [fresh] = await chkRes.json();
          if (fresh && (fresh.cliente_aprobado_at || ALREADY_APPROVED.includes(fresh.estado))) {
            if (btn) btn.disabled = false;
            alert('Esta cotización ya fue aprobada. Recargá la página para ver el estado actualizado.');
            window.location.reload();
            return;
          }
        } catch(e) { /* fail open */ }
      }

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(payload._cotizacionId)}`,
        {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            cliente_seleccion: clienteSeleccion,
            cliente_aprobado_at: new Date().toISOString(),
            adelanto_requerido_calc: adelantoMin,
            adelanto_requerido: adelantoMin,
            total_aprobado_calc: total,
            total_aprobado: total,
            estado: 'aprobado',
            con_instalacion: conInstalacion,
            pago_elegido: optPago,
            monto_pago_elegido: montoPago,
          }),
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);

      fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({
          to_user_nombres: ['Gustavo Ramos', 'Joseline Guzman'],
          event_type: 'cotizacion_aprobada',
          title: '👤 Cliente aprobó cotización',
          body: `${cliente.vehiculo || cliente.nombre || ''}`,
          url: '/repuestos',
          tag: `cotizacion-aprobada-${payload._cotizacionId}`,
        }),
      }).catch(() => {});

      // Transición a la pantalla de aprobado con el row fresco (trae los
      // campos recién escritos + joins de clientes/vehiculos). El comprobante
      // por WhatsApp ahora es un botón de esa pantalla — sin WA automático.
      try {
        const rres = await fetch(
          `${SUPABASE_URL}/rest/v1/cotizaciones?id=eq.${encodeURIComponent(payload._cotizacionId)}&select=*,clientes(nombre,apellido),vehiculos(patente,modelo,anio,marca,version,color,vin)`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        const [rrow] = await rres.json();
        if (!rrow) throw new Error('sin fila');
        window.scrollTo({ top: 0, behavior: 'auto' });
        mostrarYaAprobado(rrow);
      } catch(_) {
        window.location.reload();  // cargar() bifurca solo a la pantalla de aprobado
      }
    } catch(e) {
      if (status) status.innerHTML = `<p style="color:var(--rojo);font-size:13px;">⚠️ Error al guardar: ${esc(e.message)}</p>`;
      if (btn) btn.disabled = false;
    }
  };

  render();
}
</script>
</body>
</html>
