<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const m = window.location.pathname.match(/\/c\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})/i);
    if (m) {
      window.location.replace('/?id=' + m[1]);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
