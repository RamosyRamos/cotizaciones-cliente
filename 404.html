  <script>
    const m = window.location.pathname.match(/\/c\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})/i);
    // Preservar el query string completo (p.ej. &preview=1) al redirigir
    const extra = window.location.search ? '&' + window.location.search.slice(1) : '';
    if (m) {
      window.location.replace('/?id=' + m[1] + extra);
    } else {
      window.location.replace('/' + window.location.search);
    }
  </script>
